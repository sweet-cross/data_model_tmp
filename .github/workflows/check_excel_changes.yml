# .github/workflows/excel-diff.yml
name: Excel Diff on PR

on:
    pull_request:

permissions:
    contents: read
    pull-requests: write

jobs:
    excel-diff:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check if Excel file changed
              id: check-dimensions-changed
              run: |
                  if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "data/dimensions/dimensions.xlsx"; then
                      echo "changed=true" >> $GITHUB_OUTPUT
                  else
                      echo "changed=false" >> $GITHUB_OUTPUT
                      echo "Excel file not modified — skipping diff"
                  fi

            - name: Set up Python
              if: steps.check-dimensions-changed.outputs.changed == 'true'
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"

            - name: Install dependencies
              if: steps.check-dimensions-changed.outputs.changed == 'true'
              run: pip install openpyxl

            - name: Generate diff
              if: steps.check-dimensions-changed.outputs.changed == 'true'
              id: diff-dimension-excel
              continue-on-error: true
              run: >
                  python .github/scripts/excel_diff.py --files
                  "data/dimensions/dimensions.xlsx" --base-ref "${{
                  github.base_ref }}" --output /tmp/diff_output.md

            - name: Post diff as PR comment
              uses: actions/github-script@v9
              with:
                  script: |
                      const scriptPath = process.cwd() + '/.github/scripts/post_pr_comment.mjs';
                      const { default: script } = await import('file://' + scriptPath);
                      await script({ github, context });

            - name: Fail on validation errors
              if: steps.diff-dimension-excel.outcome == 'failure'
              run: |
                  echo "::error::Excel validation failed — see PR comment for details"
                  exit 1

# ----------------------------------------------------------------------------
#                         TABLE DESCRIPTION
# ----------------------------------------------------------------------------
name: result_electricity_supply
title: Annual electricity supply
description: >
  Annual electricity supply by year, technology, model and scenario. Result of scenario runs.
contract_type: ValueVariable

# ----------------------------------------------------------------------------
#                ----- Frictionless Table Schema -----
# ----------------------------------------------------------------------------
tableschema:
  # ----------------------------------------------------------------------------
  #                SEMANTIC FIELD DESCRIPTION
  # ----------------------------------------------------------------------------

  # ----------------------------------------------------------------------------
  #                        FOREIGN KEY CONSTRAINTS
  # ----------------------------------------------------------------------------
  # A list of field names that are jointly unique. As it is an assumption table,
  # it include the scenario information. E.g.
  primaryKey:
    [
      model,
      scenario_group,
      scenario_name,
      scenario_variant,
      country,
      year,
      unit,
      technology,
    ]

  foreignKeys:
    - fields: country
      reference:
        resource: dim_iso_region
        fields: id

    - fields: model
      reference:
        resource: dim_model
        fields: id

    - fields: [scenario_group, scenario_name, scenario_variant]
      reference:
        resource: dim_scenario
        fields: [group, name, variant]

    - fields: technology
      reference:
        resource: dim_tech_generation
        fields: id

  # ----------------------------------------------------------------------------
  #                  FRICTIONLESS FIELDS/COLUMNS
  # ----------------------------------------------------------------------------
  fields:
    - name: model
      type: string
      title: Model
      description: Name of the model producing the data
      constraints:
        required: true

    - name: scenario_group
      type: string
      title: Scenario Group
      description: Name of the scenario group this data is associated with
      constraints:
        required: true

    - name: scenario_name
      type: string
      title: Scenario Name
      description: Name of the specific scenario this data is associated with
      constraints:
        required: true

    - name: scenario_variant
      type: string
      title: Scenario Variant
      description: Variant of the scenario, if applicable
      constraints:
        required: true

    - name: technology
      type: string
      title: Generation technology
      description: Name of the generation technology
      constraints:
        required: true

    - name: country
      type: string
      title: Country Code
      description: ISO 3166-1 alpha-2 country code
      constraints:
        required: true
        maxLength: 8

    - name: year
      type: integer
      title: Year
      description: The year the data refers to
      constraints:
        required: true

    - name: unit
      type: string
      title: Unit
      description: Unit
      constraints:
        required: true
        maxLength: 16
        enum: ["TWh"]

    - name: value
      type: number
      title: Value
      description: |
        The value associated with the variable for the given scenario, model,
      constraints:
        required: true
        minimum: 0
        maximum: 1000

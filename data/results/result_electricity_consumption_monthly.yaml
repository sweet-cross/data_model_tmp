# ----------------------------------------------------------------------------
#                         TABLE DESCRIPTION
# ----------------------------------------------------------------------------
name: result_electricity_consumption_monthly
title: Result submission for the scenario runs - Monthly Electricity consumption
description: Monthly electricity consumption as submitted
contract_type: ValueVariable

# ----------------------------------------------------------------------------
#                ----- Frictionless Table Schema -----
# ----------------------------------------------------------------------------

tableschema:
  # ----------------------------------------------------------------------------
  #                SEMANTIC FIELD DESCRIPTION
  # ----------------------------------------------------------------------------

  # ----------------------------------------------------------------------------
  #                        FOREIGN KEY CONSTRAINTS
  # ----------------------------------------------------------------------------
  # A list of field names that are jointly unique. As it is an assumption table,
  # it include the scenario information. E.g.
  primaryKey:
    [
      model,
      scenario_group,
      scenario_name,
      scenario_variant,
      country,
      month,
      unit,
      sector,
    ]

  foreignKeys:
    - fields: country
      reference:
        resource: dim_iso_region
        fields: id

    - fields: model
      reference:
        resource: dim_model
        fields: id

    - fields: [scenario_group, scenario_name, scenario_variant]
      reference:
        resource: dim_scenario
        fields: [group, name, variant]

    - fields: sector
      reference:
        resource: dim_use_elec
        fields: id

  # ----------------------------------------------------------------------------
  #                  FRICTIONLESS FIELDS/COLUMNS
  # ----------------------------------------------------------------------------
  fields:
    - name: model
      type: string
      title: Model
      description: Name of the model producing the data
      constraints:
        required: true

    - name: scenario_group
      type: string
      title: Scenario Group
      description: Name of the scenario group this data is associated with
      constraints:
        required: true

    - name: scenario_name
      type: string
      title: Scenario Name
      description: Name of the specific scenario this data is associated with
      constraints:
        required: true

    - name: scenario_variant
      type: string
      title: Scenario Variant
      description: Variant of the scenario, if applicable
      constraints:
        required: true

    # todo do we need restrictions here? Done
    - name: sector
      type: string
      title: End use of the electricity
      description: Name of the end-use
      constraints:
        required: true

    - name: country
      type: string
      title: Country Code
      description: ISO 3166-1 alpha-2 country code
      constraints:
        required: true
        maxLength: 8

    - name: month
      type: string
      title: Month
      description: The month the data refers to example format "01.2050" for January 2025
      constraints:
        required: true
        enum:
          [
            "01.2025",
            "02.2025",
            "03.2025",
            "04.2025",
            "05.2025",
            "06.2025",
            "07.2025",
            "08.2025",
            "09.2025",
            "10.2025",
            "11.2025",
            "12.2025",
            "01.2030",

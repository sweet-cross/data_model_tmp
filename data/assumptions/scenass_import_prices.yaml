# ----------------------------------------------------------------------------
#                         TABLE DESCRIPTION
# ----------------------------------------------------------------------------
name: scenass_import_prices
title: Fuel import price
description: >
  Import prices by fuel type, year, and variant. Used as assumptions for scenario runs.

contract_type: ValueVariable
# ----------------------------------------------------------------------------
#                ----- Frictionless Table Schema -----
# ----------------------------------------------------------------------------
tableschema:

  # ----------------------------------------------------------------------------
  #                SEMANTIC FIELD DESCRIPTION
  # ----------------------------------------------------------------------------
  fieldDescriptors:
    - field: value
      type: value
    - field: year
      type: time
      frequency: yearly
    - field: country
      type: location
      locationType: country

  # ----------------------------------------------------------------------------
  #                        FOREIGN KEY CONSTRAINTS
  # ----------------------------------------------------------------------------
  # A list of field names that are jointly unique. As it is an assumption table,
  # it include the scenario information. E.g.
  primaryKey:
    [scenario_group, scenario_name, scenario_variant, fuel, year, country]

  # put the reference to cited fields (country left as example)
  # see: https://specs.frictionlessdata.io/table-schema/#foreign-keys
  foreignKeys:
    - fields: country
      reference:
        resource: dim_iso_region
        fields: id
    - fields: [scenario_group, scenario_name, scenario_variant]
      reference:
        resource: dim_scenario
        fields: [group, name, variant]
    - fields: fuel
      reference:
        resource: dim_fuel
        fields: id

  # ----------------------------------------------------------------------------
  #                  FRICTIONLESS FIELDS/COLUMNS
  # ----------------------------------------------------------------------------
  fields:
    - name: scenario_group
      type: string
      title: Scenario Group
      description: Group of scenarios this data is associated with

    - name: scenario_name
      type: string
      title: Scenario Name
      description: Name of the specific scenario this data is associated with

    - name: scenario_variant
      type: string
      title: Scenario Variant
      description: Variant of the scenario, if applicable

    - name: fuel
      type: string
      title: Fuel
      description: Fuel type
      constraints:
        required: true

    - name: unit
      type: string
      title: Unit
      description: Unit
      constraints:
        required: true
        maxLength: 16

    - name: country
      type: string
      title: Country Code
      description: ISO 3166-1 alpha-2 country code
      constraints:
        required: true
        maxLength: 8

    - name: year
      type: integer
      title: Year
      description: Year of the data
      constraints:
        required: true
        minimum: 1900
        maximum: 2100

    - name: value
      type: number
      title: Import Price
      description: Import price for the specified year and variant.
      constraints:
        required: true
        minimum: 0

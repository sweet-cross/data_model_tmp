# ----------------------------------------------------------------------------
#                         TABLE DESCRIPTION
# ----------------------------------------------------------------------------
name: scenass_process_heat_useful_energy_demand
title: Useful energy demand for process heat
description: |
  Useful energy demand for process heat by end-use sector used as assumptions
  for scenario runs.

# ----------------------------------------------------------------------------
#                ----- Frictionless Table Schema -----
# ----------------------------------------------------------------------------
tableschema:

  # ----------------------------------------------------------------------------
  #                SEMANTIC FIELD DESCRIPTION
  # ----------------------------------------------------------------------------
  fieldDescriptors:
    - field: value
      type: value
    - field: year
      type: time
      frequency: yearly
    - field: country
      type: location
      locationType: country

  # ----------------------------------------------------------------------------
  #                        FOREIGN KEY CONSTRAINTS
  # ----------------------------------------------------------------------------
  # A list of field names that are jointly unique. As it is an assumption table,
  # it include the scenario information. E.g.
  primaryKey:
    [scenario_group, scenario_name, scenario_variant, endusesector, year, country]

  foreignKeys:
    - fields: country
      reference:
        resource: dim_iso_region
        fields: id

    - fields: endusesector
      reference:
        resource: dim_endusesector
        fields: id

    - fields: [scenario_group, scenario_name, scenario_variant]
      reference:
        resource: dim_scenario
        fields: [group, name, variant]

  # ----------------------------------------------------------------------------
  #                  FRICTIONLESS FIELDS/COLUMNS
  # ----------------------------------------------------------------------------
  fields:
    - name: scenario_group
      type: string
      title: Scenario Group
      description: Group of scenarios this data is associated with

    - name: scenario_name
      type: string
      title: Scenario Name
      description: Name of the specific scenario this data is associated with

    - name: scenario_variant
      type: string
      title: Scenario Variant
      description: Variant of the scenario, if applicable

    - name: endusesector
      type: string
      title: Sector
      description: Commercial, Industrial, etc.
      constraints:
        required: true

    - name: unit
      type: string
      title: Unit
      description: Unit
      constraints:
        required: true
        maxLength: 16

    - name: country
      type: string
      title: Country Code
      description: ISO 3166-1 alpha-2 country code
      constraints:
        required: true
        maxLength: 8

    - name: year
      type: integer
      title: Year
      description: Year of the data
      constraints:
        required: true
        minimum: 1900
        maximum: 2100

    - name: value
      type: number
      title: Value
      description: Value
      constraints:
        required: true
        minimum: 0

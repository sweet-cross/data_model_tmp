site_name: Cross Data Model Documentation
site_description: Documentation for the data items used in the Cross project.
site_author: Sweet Cross Team
repo_url: https://github.com/sweet-cross/cross_back
repo_name: sweet-cross/cross_back
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - macros:
      module_name: docs/macros/main
      on_error_fail: true

hooks:
  - docs/hooks/dimensions.py
  - docs/hooks/flexible_dimensions.py
  - docs/hooks/assumptions.py
  - docs/hooks/results.py
  - docs/hooks/templates.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/contracts.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

nav:
  - Home: index.md
  - Dimensions:
      - Overview: dimensions/index.md
      # per-dimension pages are injected from registry.py
      # by docs/hooks/dimensions.py
      - Flexible Dimensions:
          - Overview: dimensions/flexible/index.md
          # per-flexible-dimension pages are injected from registry.py
          # by docs/hooks/flexible_dimensions.py
  - Variables:
      - Overview: variables/index.md
      - Assumptions:
          - Overview: variables/assumptions/index.md
          # per-assumption pages are injected from registry.py
          # by docs/hooks/assumptions.py
      - Results:
          - Overview: variables/results/index.md
          # per-result pages are injected from registry.py
          # by docs/hooks/results.py
  - Result Submission:
      - Overview: result_submission/index.md
      - Templates for result submission: result_submission/upload_templates.md
      - Fields: result_submission/fields.md

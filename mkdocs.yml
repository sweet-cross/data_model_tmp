site_name: Cross Data Model Documentation
site_description: Documentation for the data items used in the Cross project.
site_author: Sweet Cross Team
repo_url: https://github.com/sweet-cross/cross_back
repo_name: sweet-cross/cross_back
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - macros:
      module_name: docs/macros/dimensions
      on_error_fail: true

hooks:
  - docs/hooks/dimensions.py

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/dimensions.css

nav:
  - Home: index.md
  - Dimensions:
      - Overview: dimensions/index.md
      # per-dimension pages are injected from create_docs/registry.py
      # by docs/hooks/dimensions.py
